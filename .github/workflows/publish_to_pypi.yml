name: Publish to PyPI

on:
  push:
    paths:
      - version.bzl
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-binaries:
    name: Build binaries
    uses: ./.github/workflows/build_binaries.yml

  publish:
    name: Upload to PyPI
    runs-on: ubuntu-latest
    needs:
      - build-binaries
    environment:
      name: pypi
      url: https://pypi.org/p/lifeguard-lazy-imports
    permissions:
      id-token: write

    steps:
      - name: Download dist
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: List distribution files
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  push-tag:
    name: Push version tag
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Get version
        run: |
          VERSION=$(sed -n -e 's/^VERSION = "\(.*\)"/\1/p' version.bzl)
          echo "LIFEGUARD_VERSION=$VERSION" >> $GITHUB_ENV
      - name: Tag commit
        run: git tag "$LIFEGUARD_VERSION"
      - name: Push tag
        run: git push origin tag "$LIFEGUARD_VERSION"
